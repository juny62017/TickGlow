<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>TicGlow</title>

    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>

    <div class="main-box">

        <div class="top-section">

            <h1>
                TicGlow
            </h1>

            <p class="game-info">
                Play Tic Tac Toe against the bot
            </p>

        </div>

        <div class="status-area">

            <p class="status-text">
                Your Turn
            </p>

        </div>

        <div class="game-board">

            <div class="box" data-index="0"></div>
            <div class="box" data-index="1"></div>
            <div class="box" data-index="2"></div>

            <div class="box" data-index="3"></div>
            <div class="box" data-index="4"></div>
            <div class="box" data-index="5"></div>

            <div class="box" data-index="6"></div>
            <div class="box" data-index="7"></div>
            <div class="box" data-index="8"></div>

        </div>

        <div class="bottom-section">

            <button class="restart-btn">
                Restart Game
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
